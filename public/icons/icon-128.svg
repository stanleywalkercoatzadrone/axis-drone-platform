<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0f172a"/>
  <!-- Blue glow circle -->
  <circle cx="256" cy="256" r="200" fill="#1e293b"/>
  <!-- Drone body - center square -->
  <rect x="216" y="216" width="80" height="80" rx="12" fill="#3b82f6"/>
  <!-- Drone arms -->
  <rect x="130" y="248" width="86" height="16" rx="8" fill="#3b82f6"/>
  <rect x="296" y="248" width="86" height="16" rx="8" fill="#3b82f6"/>
  <rect x="248" y="130" width="16" height="86" rx="8" fill="#3b82f6"/>
  <rect x="248" y="296" width="16" height="86" rx="8" fill="#3b82f6"/>
  <!-- Rotors - top left -->
  <ellipse cx="156" cy="156" rx="40" ry="12" fill="none" stroke="#60a5fa" stroke-width="6" transform="rotate(45 156 156)"/>
  <!-- Rotors - top right -->
  <ellipse cx="356" cy="156" rx="40" ry="12" fill="none" stroke="#60a5fa" stroke-width="6" transform="rotate(-45 356 156)"/>
  <!-- Rotors - bottom left -->
  <ellipse cx="156" cy="356" rx="40" ry="12" fill="none" stroke="#60a5fa" stroke-width="6" transform="rotate(-45 156 356)"/>
  <!-- Rotors - bottom right -->
  <ellipse cx="356" cy="356" rx="40" ry="12" fill="none" stroke="#60a5fa" stroke-width="6" transform="rotate(45 356 356)"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="white"/>
</svg>
